# Starship prompt configuration
# https://starship.rs/config/

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
symbol = " "

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged = "[+${count}](green)"
modified = "[~${count}](yellow)"
untracked = "[?${count}](blue)"
deleted = "[-${count}](red)"

[directory]
truncation_length = 4
truncate_to_repo = true

[nodejs]
symbol = " "

[golang]
symbol = " "

[python]
symbol = " "
